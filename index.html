<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        if (location.hostname !== "oriiizz.github.io") {
          return;
        }

        var base = document.createElement("base");
        base.href = "/ori_portfolio.github.io/";
        document.head.insertBefore(base, document.head.firstChild);
      })();
    </script>
    <title>Portfolio</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./scripts/page-transition-boot.js"></script>
  </head>
  <body>
    <main
      class="home"
      aria-labelledby="home-title"
      aria-label="Open event list"
      role="link"
      tabindex="0"
      onclick="window.location.href='./event-list.html'"
      onkeydown="if (event.key === 'Enter' || event.key === ' ') window.location.href='./event-list.html'"
    >
      <div class="home__inner">
        <header class="home__intro">
          <h1 class="home__title" id="home-title">
            <span class="home__title-line">ZHENG </span>
            <span class="home__title-line">Xunan</span>
          </h1>
          <p class="home__tagline">
            Engaged in the research and practice of human-computer interaction,
            exploring the integration of installations, VR, visual art and web design.
          </p>
        </header>

        <figure class="home__hero" aria-hidden="true">
          <img src="./assets/home/hero.png" alt="" />
        </figure>

        <p class="home__cta">click me</p>
      </div>
    </main>
    <script src="./scripts/page-transition.js"></script>
  </body>
</html>
